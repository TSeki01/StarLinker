services:
  - type: web
    name: starlinker-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /api/health

  - type: web
    name: starlinker-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://starlinker-backend.onrender.com/api/*
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
